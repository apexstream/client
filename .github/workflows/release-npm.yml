name: Release npm (apexstream)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "apexstream-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish apexstream to npm
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Build package
        run: npm run build -w apexstream

      - name: Publish with provenance
        run: npm publish --workspace apexstream --access public --provenance
